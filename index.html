<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2C2820">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="法規備考">
<title>法規備考地圖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --A-bg:#FDF0EE;--A-bd:#C83828;--A-tx:#A82E20;--A-lx:#FAE2DC;
  --B-bg:#FEF8E6;--B-bd:#B88000;--B-tx:#886000;--B-lx:#FAF0C0;
  --C-bg:#EAF5F5;--C-bd:#1E7878;--C-tx:#145858;--C-lx:#D2ECEC;
  --D-bg:#F4F3F0;--D-bd:#747468;--D-tx:#4C4C48;--D-lx:#E8E6E0;
  --page:#FAFAF8;--text:#2C2820;--text2:#908878;--text3:#B0A898;
  --border:#C8C5B0;
  --s0-c:#C8C5B0;--s0-t:#888;
  --s1-c:#5A7A9A;--s1-bg:#EEF3F8;
  --s2-c:#4A7040;--s2-bg:#EEF5F0;
  --s3-c:#B88000;--s3-bg:#FEF8E6;
  --err-c:#C83828;--err-bg:#FEF0EE;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--page);color:var(--text);font-family:'Hiragino Sans','Yu Gothic','PingFang TC',system-ui,sans-serif;font-size:14px;line-height:1.5}

/* ── Header ── */
#hdr{position:sticky;top:0;z-index:50;background:rgba(250,250,248,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:calc(var(--safe-t)+8px) 14px 8px;border-bottom:.5px solid rgba(0,0,0,.07)}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.hdr-title{font-size:15px;font-weight:600;letter-spacing:.02em}
.hdr-sub{font-size:10px;color:var(--text2);margin-top:1px;line-height:1.4}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:7px}
.tab{flex:1;padding:5px 4px;border-radius:6px;border:.5px solid var(--border);background:transparent;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.tab.on{background:#2C2820;color:#FAF9F7;border-color:#2C2820;font-weight:500}
.tab-sprint.on{background:#C83828;border-color:#C83828}

/* ── Filter pills ── */
.filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.fpill{padding:3px 9px;border-radius:10px;border:.5px solid var(--border);background:transparent;font-size:10.5px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.fpill.on{font-weight:600}
.fpill-err.on{background:var(--err-bg);border-color:var(--err-c);color:var(--err-c)}
.fpill-A.on{background:var(--A-lx);border-color:var(--A-bd);color:var(--A-tx)}
.fpill-rise.on{background:#FEF8E6;border-color:#B88000;color:#886000}
.fpill-unread.on{background:#F0EDE8;border-color:#9A9880;color:#4C4C48}
.fpill-unfin.on{background:var(--s1-bg);border-color:var(--s1-c);color:var(--s1-c)}

/* ── Progress ── */
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.chip{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10.5px;border:.5px solid transparent}
.sbar{height:4px;border-radius:2px;overflow:hidden;display:flex;margin-bottom:2px}
.sbar-seg{height:4px;transition:width .4s}
.pbar2{height:3px;border-radius:2px;background:#E5E2DA;overflow:hidden;margin-bottom:2px}
.pfill2{height:3px;background:var(--s2-c);transition:width .4s}
.plbl{display:flex;justify-content:space-between;font-size:9.5px;color:var(--text3)}

/* ── Body ── */
#body{padding:10px 14px calc(var(--safe-b)+20px)}
.wrap{max-width:680px;margin:0 auto}

/* ── Sections (grade groups) ── */
.sect{margin-bottom:5px;border-radius:8px;overflow:hidden;border:.5px solid rgba(0,0,0,.06)}
.sect-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;user-select:none;-webkit-user-select:none}
.caret{font-size:10px;opacity:.4;transition:transform .2s;flex-shrink:0}
.sect-body{border-top:.5px solid rgba(0,0,0,.06)}

/* ── Law row ── */
.lrow{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:.5px solid rgba(0,0,0,.04)}
.lrow:last-child{border-bottom:none}

/* ── Group cards ── */
.gcard{margin-bottom:8px;border-radius:8px;overflow:hidden;border:.5px solid #D8D4CC}
.ghd{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F4F2EE;cursor:pointer;user-select:none;-webkit-user-select:none}
.gbody{border-top:.5px solid #D8D4CC}
.grow{display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:.5px solid rgba(0,0,0,.04)}
.grow:last-child{border-bottom:none}

/* ── Chapter header ── */
.chd{padding:5px 12px 3px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text3);background:rgba(0,0,0,.02);border-top:.5px solid rgba(0,0,0,.05)}
.chd:first-child{border-top:none}

/* ── Topic row ── */
.trow{padding:7px 12px;border-bottom:.5px solid rgba(0,0,0,.04)}
.trow:last-child{border-bottom:none}
.trow-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.trow-bot{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ── Stage button (4 stages) ── */
.stg{min-width:56px;padding:2px 7px;border-radius:10px;border:1.5px solid;cursor:pointer;font-size:10.5px;font-weight:600;font-family:inherit;transition:all .15s;text-align:center;flex-shrink:0}
.s0{border-color:var(--s0-c);color:var(--s0-t);background:transparent}
.s1{border-color:var(--s1-c);color:var(--s1-c);background:var(--s1-bg)}
.s2{border-color:var(--s2-c);color:var(--s2-c);background:var(--s2-bg)}
.s3{border-color:var(--s3-c);color:var(--s3-c);background:var(--s3-bg)}

/* ── Error flag ── */
.eflag{width:26px;height:26px;border-radius:50%;border:1.5px solid;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.eflag.off{border-color:var(--border);color:var(--text3);background:transparent}
.eflag.on{border-color:var(--err-c);color:var(--err-c);background:var(--err-bg)}

/* ── Avg badge ── */
.avgb{font-size:10px;padding:1.5px 7px;border-radius:8px;border:.5px solid;font-weight:500;white-space:nowrap;flex-shrink:0;letter-spacing:.01em}

/* ── Grade badge ── */
.badge{font-size:10.5px;font-weight:700;padding:1.5px 6px;border-radius:3px;letter-spacing:.04em;flex-shrink:0;white-space:nowrap}

/* ── Year dots ── */
.ydots{display:flex;gap:2px;align-items:center}
.ydot{width:6px;height:6px;border-radius:50%;flex-shrink:0;cursor:default}
.ylbl{font-size:9px;color:var(--text3);margin-right:1px;white-space:nowrap}

/* ── Exam question preview ── */
.sq-toggle{font-size:10px;color:var(--text2);background:none;border:.5px solid var(--border);border-radius:9px;padding:1px 7px;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap}
.sq-block{margin-top:5px;padding:7px 10px;background:#F6F4F0;border-radius:6px;border-left:2.5px solid var(--border)}
.sq-item{font-size:11px;color:var(--text);line-height:1.55;display:grid;grid-template-columns:auto 1fr;gap:6px;padding:2px 0}
.sq-item+.sq-item{border-top:.5px solid rgba(0,0,0,.06);margin-top:3px;padding-top:5px}
.sq-meta{font-size:10px;color:var(--text2);font-weight:600;white-space:nowrap;padding-top:1px}

/* ── Checkbox ── */
.chk{width:15px;height:15px;min-width:15px;border-radius:3px;border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}

/* ── Tag ── */
.tag{font-size:9.5px;padding:1px 5px;border-radius:8px;white-space:nowrap;flex-shrink:0}

/* ── Breadcrumb ── */
.bc{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#F4F2EE;border-radius:6px;border:.5px solid var(--border);margin-bottom:10px;flex-wrap:wrap}

/* ── Hint ── */
.hint{font-size:11px;color:var(--text2);background:#F4F2EE;border:.5px dashed var(--border);border-radius:6px;padding:7px 11px;margin-bottom:10px;line-height:1.7}

/* ── Stage legend ── */
.sleg{display:flex;gap:6px;flex-wrap:wrap;font-size:10px;color:var(--text2);margin-bottom:10px}

/* ── Sprint mode ── */
.sprint-hd{background:linear-gradient(135deg,#FDF0EE,#FEF8E6);border:.5px solid var(--A-bd)30;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.sprint-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;line-height:1.8}
.sprint-row{display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:.5px solid rgba(0,0,0,.04)}
.sprint-row:last-child{border-bottom:none}
.sprint-law-label{font-size:10px;font-weight:600;color:var(--text3);padding:4px 12px 2px;background:rgba(0,0,0,.025);border-top:.5px solid rgba(0,0,0,.05)}

/* ── Buttons ── */
.bsm{font-size:11px;padding:3px 9px;border-radius:4px;border:.5px solid;background:transparent;cursor:pointer;white-space:nowrap;font-family:inherit}
.brst{background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;padding:0;font-family:inherit}

/* ── Footer ── */
#footer{text-align:right;padding:16px 18px calc(var(--safe-b)+14px);margin-top:4px}
.sig{font-family:'Brush Script MT','Segoe Script','Dancing Script',cursive;font-size:20px;color:#2C2820;opacity:.32;letter-spacing:.06em;font-style:italic;display:inline-block}

/* ── Export modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;padding:16px;overflow-y:auto}
.modal-card{max-width:600px;margin:0 auto;background:#FFF;border-radius:12px;padding:20px}

/* ── Fade ── */
.faded{opacity:.48}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#C8C3B0;border-radius:2px}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.anim{animation:fi .13s ease}

/* ── Print ── */
@media print{
  #hdr{position:static;border-bottom:.5px solid #ccc;padding:10px 14px}
  .tabs,.filters,.brst,.bsm,.stg,.eflag,.chk,.sq-toggle,#footer-btns{display:none!important}
  #footer{display:block!important}
  .sig{opacity:.5}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sect,.gcard,.trow,.lrow{break-inside:avoid}
  .badge,.avgb{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div id="hdr">
  <div class="wrap">
    <div class="hdr-top">
      <div>
        <div class="hdr-title">法規備考地圖</div>
        <div class="hdr-sub">近10年校正版 · 雙權重分級（10年×60%＋近3年×40%）· ⚠易錯flag · Sprint</div>
      </div>
      <button class="brst" onclick="confirmReset()">重置</button>
    </div>
    <div class="tabs">
      <button class="tab on" id="t-freq" onclick="setView('freq')">📊 頻率</button>
      <button class="tab" id="t-grp"  onclick="setView('grp')">📚 群組</button>
      <button class="tab tab-sprint" id="t-sprint" onclick="setView('sprint')">⚡ 考前Sprint</button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="chips" id="chips"></div>
    <div class="sbar" id="sbar"></div>
    <div class="pbar2"><div class="pfill2" id="pb2"></div></div>
    <div class="plbl"><span id="pl1"></span><span id="pl2"></span></div>
  </div>
</div>

<div id="body"><div class="wrap" id="main"></div></div>

<div id="footer">
  <div class="wrap" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div id="footer-btns" style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="bsm" style="border-color:var(--border);color:var(--text2)" onclick="window.print()">🖨 列印</button>
      <button class="bsm" style="border-color:var(--border);color:var(--text2)" onclick="exportProgress()">📋 匯出進度</button>
      <button class="bsm" style="border-color:var(--s2-c);color:var(--s2-c)" onclick="openJsonExport()">💾 備份進度</button>
      <button class="bsm" style="border-color:var(--s1-c);color:var(--s1-c)" onclick="openJsonImport()">📲 還原進度</button>
    </div>
    <span class="sig">Hsuannn</span>
  </div>
</div>

<!-- Export modal -->
<div class="modal-overlay" id="exp-modal">
  <div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:15px;font-weight:600">匯出學習進度</span>
      <button onclick="closeExport()" style="background:none;border:none;font-size:18px;color:var(--text2);cursor:pointer">✕</button>
    </div>
    <div style="font-size:11.5px;color:var(--text2);margin-bottom:10px">Notion 相容 Markdown，可直接貼入 Notion 作為學習記錄</div>
    <textarea id="exp-text" readonly style="width:100%;height:300px;font-family:monospace;font-size:11px;line-height:1.6;padding:10px;border:.5px solid var(--border);border-radius:6px;resize:none;background:#F6F4F0;color:var(--text)"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:10px">
      <button onclick="copyExport()" id="exp-copy" class="bsm" style="border-color:var(--s2-c);color:var(--s2-c);padding:7px 16px;font-size:13px">複製全部</button>
    </div>
  </div>
</div>

<!-- JSON 備份 modal -->
<div class="modal-overlay" id="json-exp-modal">
  <div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:15px;font-weight:600">💾 備份進度 JSON</span>
      <button onclick="document.getElementById('json-exp-modal').style.display='none'" style="background:none;border:none;font-size:18px;color:var(--text2);cursor:pointer">✕</button>
    </div>
    <div style="font-size:11.5px;color:var(--text2);margin-bottom:10px;line-height:1.7">
      複製下方全部文字，存到記事本或用訊息傳給自己。<br>
      換裝置時點「還原進度」貼回即可同步。
    </div>
    <textarea id="json-exp-text" readonly style="width:100%;height:200px;font-family:monospace;font-size:10.5px;line-height:1.5;padding:10px;border:.5px solid var(--border);border-radius:6px;resize:none;background:#F6F4F0;color:var(--text)"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:10px">
      <button onclick="copyJsonExport()" id="json-exp-copy" class="bsm" style="border-color:var(--s2-c);color:var(--s2-c);padding:7px 16px;font-size:13px">複製全部</button>
    </div>
  </div>
</div>

<!-- JSON 還原 modal -->
<div class="modal-overlay" id="json-imp-modal">
  <div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:15px;font-weight:600">📲 還原進度 JSON</span>
      <button onclick="document.getElementById('json-imp-modal').style.display='none'" style="background:none;border:none;font-size:18px;color:var(--text2);cursor:pointer">✕</button>
    </div>
    <div style="font-size:11.5px;color:var(--text2);margin-bottom:10px;line-height:1.7">
      將備份的 JSON 文字貼到下方，點「確認還原」。<br>
      <span style="color:var(--err-c);font-weight:600">⚠ 目前裝置的進度會被覆蓋，請確認後再操作。</span>
    </div>
    <textarea id="json-imp-text" placeholder="貼上備份的 JSON 文字…" style="width:100%;height:200px;font-family:monospace;font-size:10.5px;line-height:1.5;padding:10px;border:.5px solid var(--border);border-radius:6px;resize:none;background:#FAFAF8;color:var(--text)"></textarea>
    <div id="json-imp-err" style="font-size:11px;color:var(--err-c);margin-top:6px;min-height:16px"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">
      <button onclick="document.getElementById('json-imp-modal').style.display='none'" class="bsm" style="border-color:var(--border);color:var(--text2);padding:7px 14px;font-size:13px">取消</button>
      <button onclick="doJsonImport()" class="bsm" style="border-color:var(--s1-c);color:var(--s1-c);padding:7px 16px;font-size:13px;font-weight:600">確認還原</button>
    </div>
  </div>

// ── State ─────────────────────────────────────────────────
let S={

  og:{A:true,B:false,C:false,D:false},
  og2:{g1:true,g2:false,g3:false,g4:false,g5:false,g6:false,g7:false},
  filter:null, // null | "err" | "A" | "rise" | "unread" | "unfin"
  read:new Set(), mat:{}, err:new Set(), sqOpen:new Set()
};

function load(){
  try{
    var r=localStorage.getItem("lcm_r6"); if(r) S.read=new Set(r.split(",").filter(function(x){return x;}).map(Number));
    var m=localStorage.getItem("lcm_m6"); if(m) S.mat=JSON.parse(m);
    var e=localStorage.getItem("lcm_e6"); if(e) S.err=new Set(e.split(",").filter(function(x){return x;}));
  }catch(e){}
}
function saveAll(){
  try{
    localStorage.setItem("lcm_r6",[...S.read].join(","));
    localStorage.setItem("lcm_m6",JSON.stringify(S.mat));
    localStorage.setItem("lcm_e6",[...S.err].join(","));
  }catch(e){}
}
function confirmReset(){if(confirm("確定重置所有進度與標記？")){S.read=new Set();S.mat={};S.err=new Set();S.sqOpen=new Set();saveAll();render();}}

// ── Helpers ───────────────────────────────────────────────
const lgG = g => LAWS.map((l,i)=>({...l,i})).filter(l=>l.grade===g);
const tTotal = () => LAWS.reduce((a,l)=>a+l.topics.length, 0);
const tRM = () => LAWS.reduce((a,l)=>a+l.readMin, 0);
const dRM = () => [...S.read].reduce(function(a,i){return a+((LAWS[i]&&LAWS[i].readMin)||0);}, 0);
const getMat = (li,ti) => S.mat[`${li}_${ti}`]||0;
const isErr = (li,ti) => S.err.has(`${li}_${ti}`);
const stageCounts = () => {
  const c=[0,0,0,0]; const tt=tTotal();
  Object.values(S.mat).forEach(v=>{ if(v>=0&&v<=3) c[v]++; });
  c[0]=tt-c[1]-c[2]-c[3]; return c;
};

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function chkEl(on,fn){return`<div class="chk" style="border-color:${on?"#4A7040":"var(--border)"};background:${on?"#4A7040":"transparent"}" onclick="${fn}">${on?'<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':""}</div>`}
function bdg(g,f){return`<span class="badge" style="background:${f?GC[g].bd:"transparent"};border:.5px solid ${GC[g].bd};color:${f?"#FFF":GC[g].tx}">${g}</span>`}
function gbdg(g){return`<span class="badge" style="border:.5px solid ${GC[g].bd};color:${GC[g].tx};background:transparent">${GC[g].name}</span>`}

// Compact avg: "10Y 7.8 ｜ 3Y 9.2"
function avgB(g,avg,avg3){
  return`<span class="avgb" style="background:${GC[g].lx};border-color:${GC[g].bd}50;color:${GC[g].tx}">10Y ${avg} ｜ 3Y ${avg3}</span>`;
}

// Stage button (4 stages)
function stgBtn(li,ti){

  return`<button class="stg ${st.cls}" onclick="nextStage(${li},${ti})" title="點擊切換下一階段">${st.sym} ${st.lbl}</button>`;
}
// Error flag toggle
function errBtn(li,ti){
  const on=isErr(li,ti);

// Year dots
function yrDots(yrs,g){

// Question preview: truncate at ？ for preview
function sqPreview(text){
  const qi=text.indexOf("？");
  if(qi>=0&&qi<=70) return text.slice(0,qi+1);
  return text.slice(0,60)+(text.length>60?"…":"");
}

function sqHtml(li,ti,sq){
  if(!sq||!sq.length) return "";
  const key=`${li}_${ti}`, isOpen=S.sqOpen.has(key);
  let inner="";
  if(isOpen){
    inner=`<div class="sq-block">${sq.map(s=>{
      const p=s.indexOf("｜"),meta=p>=0?s.slice(0,p):"",txt=p>=0?s.slice(p+1):s;
      return`<div class="sq-item"><span class="sq-meta">${esc(meta)}</span><span>${esc(txt)}</span></div>`;
    }).join("")}</div>`;
  } else {
    // Single-line preview: show first question truncated at ？
    const first=sq[0], p=first.indexOf("｜"), meta=p>=0?first.slice(0,p):"", txt=p>=0?first.slice(p+1):first;
    inner=`<span style="font-size:10px;color:var(--text3);margin-left:2px">${esc(meta)} · ${esc(sqPreview(txt))}</span>`;
  }
  return`<button class="sq-toggle" onclick="togSQ('${key}')">${isOpen?"▲":"▼"}</button>${inner}`;
}

// ── Filter logic ───────────────────────────────────────────
function topicPassesFilter(li,ti,topic){
  if(!S.filter) return true;
  if(S.filter==="err") return isErr(li,ti);
  if(S.filter==="A") return topic.grade==="A";
  if(S.filter==="rise") return topic.avg3>topic.avg;
  if(S.filter==="unread") return getMat(li,ti)===0;
  if(S.filter==="unfin") return getMat(li,ti)<3;
  return true;
}
function lawPassesFilter(law,li){
  if(!S.filter) return true;
  return law.topics.some((_,ti)=>topicPassesFilter(li,ti,law.topics[ti]));
}

// ── Law row HTML ──────────────────────────────────────────
function lawRowHtml(i,name,grade,avg,avg3,trend,readMin,topics,rowCls){
  const iR=S.read.has(i), gc=GC[grade];

    ${chkEl(iR,`tR(${i})`)}

}

// ── Sprint view ───────────────────────────────────────────
function renderSprint(){
  // Collect: A/B法規 + (⚠易錯 OR A/B條款 + 近3年上升 + 未熟背)
  const items=[];
  LAWS.forEach((law,li)=>{
    if(law.grade!=="A"&&law.grade!=="B") return;
    law.topics.forEach((t,ti)=>{
      const key=`${li}_${ti}`, stage=getMat(li,ti), errFlag=isErr(li,ti);
      const rising=t.avg3>t.avg, unfinished=stage<3;
      if(errFlag||(( t.grade==="A"||t.grade==="B")&&rising&&unfinished)){
        items.push({li,ti,law,topic:t,stage,errFlag,score:(errFlag?10:0)+(t.avg3||0)});
      }
    });
  });
  items.sort((a,b)=>b.score-a.score);

  const sprintCount=items.length;
  let h=`<div class="sprint-hd">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">⚡ 考前 Sprint 複習包</div>
    <div style="font-size:11.5px;color:var(--text2);line-height:1.6">
      自動篩選：<strong>⚠易錯</strong> ＋ <strong>A/B級條款 × 近3年↑ × 未熟背</strong><br>
      共 <strong>${sprintCount}</strong> 個條款 · 建議每次30分鐘，完成後將條款標為★熟背
    </div>
  </div>`;

  if(!sprintCount){
    h+=`<div class="sprint-empty">🎉 目前沒有需要衝刺的條款<br><span style="font-size:11px">所有A/B級近3年熱門條款都已熟背，或尚未有⚠易錯標記</span></div>`;
  } else {
    // Group by law
    const byLaw=new Map();
    items.forEach(item=>{
      const k=item.li;
      if(!byLaw.has(k)) byLaw.set(k,[]);
      byLaw.get(k).push(item);
    });
    byLaw.forEach((its,li)=>{
      const law=LAWS[li],gc=GC[law.grade];
      h+=`<div class="sect" style="border-color:${gc.bd}30">
        <div style="display:flex;align-items:center;gap:6px;padding:7px 12px;background:${gc.bg};border-bottom:.5px solid ${gc.bd}20">
          ${bdg(law.grade,true)}<span style="font-size:12.5px;font-weight:500">${esc(law.name)}</span>
          <span style="font-size:10px;color:var(--text2);margin-left:auto">${its.length}條</span>
        </div>`;
      its.forEach(({ti,topic,stage,errFlag})=>{
        const sep=topic.name.indexOf("｜"),sn=sep>=0?topic.name.slice(sep+1):topic.name;
        const rowBg=errFlag?"var(--err-bg)":stage===3?"#FFFBF0":"transparent";
        h+=`<div class="sprint-row" style="background:${rowBg}">
          ${stgBtn(li,ti)} ${errBtn(li,ti)}
          ${bdg(topic.grade,true)}
          <span style="flex:1;font-size:12px;line-height:1.4;min-width:0">${esc(sn)}</span>
          ${avgB(topic.grade,topic.avg,topic.avg3)}
        </div>`;
      });
      h+="</div>";
    });
  }
  document.getElementById("main").innerHTML=h;
}

// ── Topic detail ──────────────────────────────────────────

  const law=LAWS[S.curLaw], gc=GC[law.grade];
  const chapMap=new Map();
  law.topics.forEach((t,ti)=>{
    if(S.filter&&!topicPassesFilter(S.curLaw,ti,t)) return;
    const sep=t.name.indexOf("｜"), chap=sep>=0?t.name.slice(0,sep):"其他", rest=sep>=0?t.name.slice(sep+1):t.name;
    if(!chapMap.has(chap)) chapMap.set(chap,[]);
    chapMap.get(chap).push({...t,ti,sn:rest});
  });

  let blocksH="";
  chapMap.forEach((tps,chap)=>{
    const rowsH=tps.map(({ti,sn,avg,avg3,grade,yrs,sq})=>{
      const m=getMat(S.curLaw,ti), errF=isErr(S.curLaw,ti), gc2=GC[grade];
      const rowBg=errF?"#FFF5F5":m===3?"#FFFBF0":m===2?"#F8FBF8":"transparent";
      return`<div class="trow" style="background:${rowBg}">
        <div class="trow-top">
          ${stgBtn(S.curLaw,ti)} ${errBtn(S.curLaw,ti)}
          ${bdg(grade,true)}
          <span style="flex:1;font-size:12px;line-height:1.4;min-width:0;color:${m===0?"var(--text3)":"var(--text)"}">${esc(sn)}</span>
          ${avgB(grade,avg,avg3)}
        </div>
        <div class="trow-bot">
          ${yrDots(yrs,grade)}
          ${sqHtml(S.curLaw,ti,sq)}
        </div>
      </div>`;
    }).join("");
    if(rowsH) blocksH+=`<div class="anim"><div class="chd">${esc(chap)}</div>${rowsH}</div>`;
  });

  const sc2=[0,0,0,0]; law.topics.forEach((_,ti)=>{const m=getMat(S.curLaw,ti);if(m<=3)sc2[m]++;});
  const errCnt=law.topics.filter((_,ti)=>isErr(S.curLaw,ti)).length;
  const stageCols=["#C8C5B040","#5A7A9A","#4A7040","#B88000"];

  document.getElementById("main").innerHTML=`
    <div class="bc">
      <button onclick="backToList()" style="background:none;border:none;font-size:12px;color:var(--text2);cursor:pointer;padding:0;font-family:inherit">← 返回</button>
      <span style="font-size:10px;color:#C0B8A8">/</span>
      ${bdg(law.grade,true)}
      <span style="font-size:13px;font-weight:500">${esc(law.name)}</span>
      <span style="font-size:11px;color:var(--text2);margin-left:auto">10Y ${law.avg} ｜ 3Y ${law.avg3}</span>
    </div>
    <div class="sleg">
      ${STAGES.map((st,i)=>`<span><span style="color:${stageCols[i].replace("40","")}; font-weight:700">${st.sym}</span>${st.lbl} ${sc2[i]}</span>`).join("")}
      <span style="color:var(--err-c)">⚠易錯 ${errCnt}</span>
      <span style="color:var(--text3)">點擊按鈕切換</span>
    </div>
    <div class="hint">📝 整理筆記請至 <strong>Claude.ai</strong> 對話，貼入條文即可依頻率生成 Notion 筆記</div>
    <div class="sect" style="border-color:${gc.bd}30">${blocksH||`<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">目前篩選條件沒有符合的條款</div>`}</div>`;
}

// ── Actions ───────────────────────────────────────────────
function setView(v){S.mainV=v;S.detailV=null;S.filter=null;render();}
function setFilter(f){S.filter=S.filter===f?null:f;render();}
function togG(g){S.og[g]=!S.og[g];render();}
function togGrp(id){S.og2[id]=!S.og2[id];render();}
function openLaw(li){S.curLaw=li;S.detailV="t";S.sqOpen=new Set();window.scrollTo(0,0);render();}
function backToList(){S.detailV=null;render();}
function tR(li){S.read.has(li)?S.read.delete(li):S.read.add(li);saveAll();render();}
function nextStage(li,ti){const key=`${li}_${ti}`;S.mat[key]=(getMat(li,ti)+1)%4;saveAll();render();}
function togErr(li,ti){const key=`${li}_${ti}`;S.err.has(key)?S.err.delete(key):S.err.add(key);saveAll();render();}
function togSQ(key){S.sqOpen.has(key)?S.sqOpen.delete(key):S.sqOpen.add(key);render();}

// ── Export progress ───────────────────────────────────────
function exportProgress(){
  const SN=["○ 未讀","◐ 粗讀","◉ 筆記完成","★ 熟背"];
  const now=new Date(), ds=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const sc=stageCounts(), errCnt=S.err.size, nr=S.read.size, tl=LAWS.length, tt=tTotal();
  let md=`# 法規備考進度記錄\n\n更新日期：${ds}\n\n`;
  md+=`## 整體進度\n\n- 法規粗讀：${nr}／${tl}（${Math.round(nr/tl*100)}%）\n`;
  md+=`- 條款：○${sc[0]} ◐${sc[1]} ◉${sc[2]} ★${sc[3]} ⚠${errCnt}\n\n---\n\n`;
  ["A","B","C","D"].forEach(g=>{
    const ls=lgG(g);
    md+=`## ${g}級｜${GC[g].name}\n\n`;
    ls.forEach(law=>{
      const iR=S.read.has(law.i);
      md+=`### ${iR?"[x]":"[ ]"} ${law.name}　10Y ${law.avg} ｜ 3Y ${law.avg3}\n\n`;
      const chapMap=new Map();
      law.topics.forEach((t,ti)=>{
        const sep=t.name.indexOf("｜"),chap=sep>=0?t.name.slice(0,sep):"其他",rest=sep>=0?t.name.slice(sep+1):t.name;
        if(!chapMap.has(chap))chapMap.set(chap,[]);chapMap.get(chap).push({...t,ti,sn:rest});
      });
      chapMap.forEach((tps,chap)=>{
        md+=`**${chap}**\n\n`;
        tps.forEach(({ti,sn,avg,avg3,grade})=>{
          const m=getMat(law.i,ti),e=isErr(law.i,ti)?` ⚠`:"";
          md+=`- ${SN[m]}${e}　${sn}　（${grade}級，10Y ${avg} ｜ 3Y ${avg3}）\n`;
        });
        md+="\n";
      });
    });
  });
  md+=`---\n\n*由法規備考地圖匯出 · Hsuannn*\n`;
  document.getElementById("exp-text").value=md;
  document.getElementById("exp-modal").style.display="block";
}
function closeExport(){document.getElementById("exp-modal").style.display="none";}
function copyExport(){
  const ta=document.getElementById("exp-text");
  try{navigator.clipboard.writeText(ta.value);}catch(e){ta.select();document.execCommand("copy");}
  const btn=document.getElementById("exp-copy");btn.textContent="✓ 已複製";btn.style.background="var(--s2-bg)";
  setTimeout(()=>{btn.textContent="複製全部";btn.style.background="";},2000);
}

// ── JSON 備份 / 還原 ──────────────────────────────────────
function openJsonExport(){
  const data={v:6,read:[...S.read],mat:S.mat,err:[...S.err]};
  document.getElementById("json-exp-text").value=JSON.stringify(data);
  document.getElementById("json-exp-modal").style.display="block";
}
function copyJsonExport(){
  const ta=document.getElementById("json-exp-text");
  try{navigator.clipboard.writeText(ta.value);}catch(e){ta.select();document.execCommand("copy");}
  const btn=document.getElementById("json-exp-copy");btn.textContent="✓ 已複製";
  setTimeout(()=>{btn.textContent="複製全部";},2000);
}
function openJsonImport(){
  document.getElementById("json-imp-text").value="";
  document.getElementById("json-imp-err").textContent="";
  document.getElementById("json-imp-modal").style.display="block";
}
function doJsonImport(){
  const errEl=document.getElementById("json-imp-err");
  errEl.textContent="";
  try{
    const raw=document.getElementById("json-imp-text").value.trim();
    if(!raw){errEl.textContent="請先貼上備份的 JSON 文字";return;}
    const d=JSON.parse(raw);
    if(d.v!==6||!Array.isArray(d.read)||typeof d.mat!=="object"||!Array.isArray(d.err)){
      errEl.textContent="格式不符，請確認是從「備份進度」複製的文字";return;
    }
    S.read=new Set(d.read.map(Number));
    S.mat=d.mat;
    S.err=new Set(d.err);
    saveAll();
    document.getElementById("json-imp-modal").style.display="none";
    render();
    alert("✓ 進度已還原成功！");
  }catch(e){
    errEl.textContent="無法解析，請確認文字完整未遭截斷";
  }
}

// ── Render ────────────────────────────────────────────────
function render(){
  updateHdr();
  if(S.detailV==="t"){ renderTopics(); return; }
  if(S.mainV==="sprint"){ renderSprint(); return; }
  S.mainV==="freq" ? renderFreq() : renderGroups();
}

load(); render();
</script>
